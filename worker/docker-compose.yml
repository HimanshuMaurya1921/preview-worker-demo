
services:
  ai-worker:
    build: .
    container_name: ai-worker-pool
    restart: unless-stopped
    ports:
      - "3001:3001"       # Orchestrator API
      - "4000-4050:4000-4050"  # Next.js worker instances
    environment:
      - WORKER_PORT=3001
      - POOL_MIN=2
      - POOL_MAX=10
      - PORT_BASE=4000
      - SESSION_TTL_MS=300000
    deploy:
      resources:
        limits:
          memory: 3G       # Hard cap — container is killed if it exceeds this
        reservations:
          memory: 512M     # Guaranteed minimum
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # Give the pool time to warm up before checking
    tmpfs:
      - /tmp:size=2500M,exec    # RAM-backed + exec permission for Next.js binaries
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
