apiVersion: v1
kind: ServiceAccount
metadata:
  name: orchestrator
  namespace: preview
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: preview-pod-manager
  namespace: preview
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orchestrator-preview-binding
  namespace: preview
subjects:
- kind: ServiceAccount
  name: orchestrator
  namespace: preview
roleRef:
  kind: Role
  name: preview-pod-manager
  apiGroup: rbac.authorization.k8s.io
