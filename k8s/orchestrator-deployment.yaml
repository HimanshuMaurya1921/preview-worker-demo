apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: preview
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      serviceAccountName: orchestrator
      containers:
      - name: orchestrator
        # REPLACE with your GCR/Artifact Registry image: gcr.io/PROJECT/orchestrator:latest
        # image: REPLACE_WITH_YOUR_REGISTRY_IMAGE
        image: orchestrator:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3001
        env:
        - name: RUNTIME
          value: "gke"
        - name: WORKER_IMAGE
          value: "preview-worker:local"
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: SESSION_TTL_SECONDS
          value: "1800"
        - name: WORKER_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: preview-worker-secret
              key: auth-token
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: preview
spec:
  selector:
    app: orchestrator
  ports:
  - port: 80
    targetPort: 3001
  type: LoadBalancer
